name: Monitor Rios

on:
  schedule:
    - cron: '0 * * * *'   # cada hora
  workflow_dispatch:        # permite correrlo manualmente

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias
        run: |
          sudo apt-get install -y fonts-liberation
          pip install requests beautifulsoup4 Pillow

      - name: Crear config.json
        env:
          GMAIL_USUARIO: ${{ secrets.GMAIL_USUARIO }}
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
          CALLMEBOT_PHONE: ${{ secrets.CALLMEBOT_PHONE }}
          CALLMEBOT_APIKEY: ${{ secrets.CALLMEBOT_APIKEY }}
          FACEBOOK_PAGE_TOKEN: ${{ secrets.FACEBOOK_PAGE_TOKEN }}
        run: |
          python3 -c "
          import json, os
          config = {
            'gmail_usuario': os.environ['GMAIL_USUARIO'],
            'gmail_password': os.environ['GMAIL_PASSWORD'],
            'callmebot_phone': os.environ.get('CALLMEBOT_PHONE', ''),
            'callmebot_apikey': os.environ.get('CALLMEBOT_APIKEY', ''),
            'facebook_page_token': os.environ.get('FACEBOOK_PAGE_TOKEN', ''),
          }
          with open('config.json', 'w') as f:
              json.dump(config, f)
          "

      - name: Restaurar ultimo registro
        uses: actions/cache@v4
        with:
          path: |
            ultimo_bonete.json
            ultimo_tostado.json
            ultimo_calchaqui.json
            ultimo_piedras.json
          key: ultimos-registros-${{ github.run_id }}
          restore-keys: ultimos-registros-

      - name: Correr monitor
        run: python monitor.py

      - name: Guardar ultimo registro
        uses: actions/cache/save@v4
        if: always()
        with:
          path: |
            ultimo_bonete.json
            ultimo_tostado.json
            ultimo_calchaqui.json
            ultimo_piedras.json
          key: ultimos-registros-${{ github.run_id }}
